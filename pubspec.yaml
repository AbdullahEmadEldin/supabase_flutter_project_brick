name: mizan
description: "gold erp system"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.9.2


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  hydrated_bloc: ^10.1.1
  flutter_bloc: ^9.1.1
  path_provider: ^2.1.5
  easy_localization: ^3.0.8
  shared_preferences: ^2.5.3
  flutter_dotenv: ^6.0.0
  flutter_svg: ^2.2.3
  go_router: ^17.1.0
  get_it: ^9.2.1
  supabase_flutter: ^2.12.0
  shimmer_animation: ^2.2.2+1
  equatable: ^2.0.8
  dartz: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/translations/
    - assets/icons/
    - assets/pngs/
    - .env
  
  fonts:
    - family: IPMPlexSansArabic
      fonts:
        - asset: assets/fonts/IPMPlexSansArabic-Medium.ttf
          weight: 500
        - asset: assets/fonts/IPMPlexSansArabic-Regular.ttf
          weight: 400
        - asset: assets/fonts/IPMPlexSansArabic-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IPMPlexSansArabic-Bold.ttf
          weight: 700